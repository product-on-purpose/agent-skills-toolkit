# CI for agent-skills-toolkit.
#
# Per Standard sec 4.1 and 4.4, this workflow contains NO validation logic of its
# own: it only shells out to the portable Node scripts under scripts/. That keeps
# local and CI runs identical (a contributor can reproduce any CI failure with the
# same command locally) and keeps the plugin independent of any CI provider.
#
# Phase 1: the validation spine is now live. This workflow runs the full unit test
# suite and then the conformance gate (`node scripts/check.mjs`). Both steps are
# pure script invocations - the YAML itself holds no validation logic.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node from .nvmrc (pin 24; baseline >=22.12.0, the family floor; Node 20 is EOL)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Conformance gate (self-validation)
        run: node scripts/check.mjs

  # Non-deploying site build: proves the Astro Starlight site in site/ compiles on
  # every push and PR, so a green PR predicts a green deploy. Catalog drift is covered
  # by the validate job (npm test). Deployment itself lives in deploy-pages.yml; this
  # job never uploads a Pages artifact.
  build-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node from .nvmrc (pin 24; the committed pin is the single CI source of truth)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site (no deploy)
        id: build
        run: npm run build

      # Clause 14.11 link/route integrity, enforced in the PR build (the donor pattern from
      # pm-skills; see site/scripts/ and ADR 0026). Both gate on the build step's own outcome, so
      # they run only when the build succeeded (a build failure surfaces the real Astro error, not a
      # secondary "dist not found") yet still run independently of each other (a failure in one
      # still reports the other, since the condition overrides the default success() of all prior
      # steps). Both operate on the built dist in the site working directory.
      - name: Check rendered links + anchors (clause 14.11a; enforcing)
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        env:
          STRICT_ANCHORS: "1"
        run: node scripts/check-rendered-links.mjs dist

      - name: Check route parity (clause 14.11b; no published route removed without a redirect)
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: node scripts/check-route-parity.mjs dist scripts/route-manifest.txt
