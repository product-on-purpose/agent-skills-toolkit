# CI for agent-skills-toolkit.
#
# Per Standard sec 4.1 and 4.4, this workflow contains NO validation logic of its
# own: it only shells out to the portable Node scripts under scripts/. That keeps
# local and CI runs identical (a contributor can reproduce any CI failure with the
# same command locally) and keeps the plugin independent of any CI provider.
#
# Phase 1: the validation spine is now live. This workflow runs the full unit test
# suite and then the conformance gate (`node scripts/check.mjs`). Both steps are
# pure script invocations - the YAML itself holds no validation logic.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (baseline >=20 LTS, per Standard sec 4.1)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Conformance gate (self-validation)
        run: node scripts/check.mjs
